{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Heartly{% endblock %}</title>

    <style>
        :root {
            --heartly-bg: #0f0710;
            --heartly-card: rgba(255, 255, 255, 0.08);
            --heartly-border: rgba(255, 255, 255, 0.12);
            --heartly-text: #ffffff;
            --heartly-muted: rgba(255, 255, 255, 0.68);
            --heartly-pink: #ff4f7b;
            --heartly-pink-soft: #ff9ab6;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 12% 8%, rgba(255, 79, 123, 0.25), transparent 34%),
                radial-gradient(circle at 88% 82%, rgba(255, 154, 190, 0.17), transparent 35%),
                linear-gradient(135deg, #120812 0%, #1b0c18 46%, #0f0710 100%);
            color: var(--heartly-text);
        }

        a {
            color: inherit;
        }

        .heartly-auth-layout {
            min-height: 100vh;
            padding: 28px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .heartly-auth-shell {
            width: min(100%, 430px);
        }

        .heartly-auth-brand {
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .heartly-auth-brand-mark {
            width: 44px;
            height: 44px;
            display: grid;
            place-items: center;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--heartly-pink), var(--heartly-pink-soft));
            box-shadow: 0 14px 32px rgba(255, 79, 123, 0.32);
            font-size: 1.5rem;
            font-weight: 900;
        }

        .heartly-auth-brand-text strong {
            display: block;
            font-size: 1.1rem;
            line-height: 1;
            letter-spacing: -0.04em;
        }

        .heartly-auth-brand-text span {
            display: block;
            margin-top: 3px;
            color: var(--heartly-muted);
            font-size: 0.78rem;
            font-weight: 700;
        }

        @media (max-width: 460px) {
            .heartly-auth-layout {
                align-items: flex-start;
                padding-top: 26px;
            }
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body>
    <main class="heartly-auth-layout">
        <div class="heartly-auth-shell">

            <div class="heartly-auth-brand">
                <div class="heartly-auth-brand-mark">♥</div>
                <div class="heartly-auth-brand-text">
                    <strong>Heartly</strong>
                    <span>Connect with meaning</span>
                </div>
            </div>

            {% block content %}{% endblock %}

        </div>
    </main>
</body>
</html>

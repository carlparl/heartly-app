{% extends "heartly/base.html" %}
{% load static %}

{% block title %}Log out - Heartly{% endblock %}

{% block content %}
<div class="heartly-logout-page">
    <div class="heartly-logout-card">

        <div class="heartly-logout-logo-wrap">
            <div class="heartly-logout-logo">
                <span>♥</span>
            </div>
        </div>

        <div class="heartly-logout-copy">
            <p class="heartly-kicker">Session</p>
            <h1>Log out?</h1>
            <p>
                You are about to leave your Heartly account. You can sign back in anytime.
            </p>
        </div>

        <form method="post" action="{% url 'account_logout' %}" class="heartly-logout-form">
            {% csrf_token %}

            <div class="heartly-btn-group">
                <button type="submit" class="heartly-submit">
                    Yes, log me out
                </button>

                <a href="{% url 'feed:feed_home' %}" class="heartly-secondary-btn">
                    Cancel
                </a>
            </div>
        </form>

    </div>
</div>

<style>
    .heartly-logout-page {
        min-height: calc(100vh - 80px);
        padding: 28px 16px 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
            radial-gradient(circle at 10% 10%, rgba(255, 79, 123, 0.20), transparent 32%),
            radial-gradient(circle at 90% 80%, rgba(255, 164, 190, 0.22), transparent 36%),
            linear-gradient(135deg, #fff8fb 0%, #fff 48%, #fff3f7 100%);
    }

    .heartly-logout-card {
        width: min(100%, 430px);
        padding: 28px 22px 24px;
        border-radius: 34px;
        text-align: center;
        background: rgba(255, 255, 255, 0.76);
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow:
            0 24px 70px rgba(120, 24, 58, 0.14),
            inset 0 1px 0 rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
    }

    .heartly-logout-logo-wrap {
        display: flex;
        justify-content: center;
        margin-bottom: 18px;
    }

    .heartly-logout-logo {
        width: 82px;
        height: 82px;
        display: grid;
        place-items: center;
        border-radius: 28px;
        background: linear-gradient(135deg, #ff4f7b, #ff9ab6);
        box-shadow: 0 22px 42px rgba(255, 79, 123, 0.28);
    }

    .heartly-logout-logo span {
        color: white;
        font-size: 2.8rem;
        line-height: 1;
        transform: translateY(-1px);
    }

    .heartly-kicker {
        margin: 0 0 8px;
        color: #ff4f7b;
        font-size: 0.75rem;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
    }

    .heartly-logout-copy h1 {
        margin: 0;
        color: #27101a;
        font-size: clamp(2.1rem, 8vw, 3rem);
        letter-spacing: -0.06em;
        line-height: 0.96;
    }

    .heartly-logout-copy p {
        margin: 14px auto 0;
        max-width: 330px;
        color: #806170;
        font-size: 0.97rem;
        line-height: 1.6;
    }

    .heartly-logout-form {
        margin-top: 26px;
    }

    .heartly-btn-group {
        display: grid;
        gap: 12px;
    }

    .heartly-submit,
    .heartly-secondary-btn {
        width: 100%;
        min-height: 52px;
        border-radius: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.96rem;
        font-weight: 800;
        text-decoration: none;
        cursor: pointer;
        transition:
            transform 0.18s ease,
            box-shadow 0.18s ease,
            background 0.18s ease,
            border-color 0.18s ease;
    }

    .heartly-submit {
        border: none;
        color: #ffffff;
        background: linear-gradient(135deg, #ff3f72, #ff7fa2);
        box-shadow: 0 16px 34px rgba(255, 63, 114, 0.27);
    }

    .heartly-submit:hover {
        transform: translateY(-1px);
        box-shadow: 0 18px 38px rgba(255, 63, 114, 0.32);
    }

    .heartly-secondary-btn {
        color: #3a1725;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(255, 154, 182, 0.38);
    }

    .heartly-secondary-btn:hover {
        transform: translateY(-1px);
        background: rgba(255, 245, 249, 0.95);
        border-color: rgba(255, 79, 123, 0.48);
    }

    @media (max-width: 420px) {
        .heartly-logout-card {
            padding: 24px 18px 20px;
            border-radius: 30px;
        }

        .heartly-logout-logo {
            width: 74px;
            height: 74px;
            border-radius: 25px;
        }
    }
</style>
{% endblock %}

{% extends "heartly/base.html" %}

{% block title %}{{ title }} | Heartly{% endblock %}

{% block content %}
<main class="container py-5" style="max-width: 820px;">
  <article class="card shadow-sm border-0">
    <div class="card-body p-4 p-md-5">
      <h1 class="h2 mb-3">{{ title }}</h1>
      <p class="lead text-muted">{{ intro }}</p>
      {% for heading, body in sections %}
        <section class="mt-4">
          <h2 class="h5">{{ heading }}</h2>
          <p class="mb-0">{{ body }}</p>
        </section>
      {% endfor %}
      <hr class="my-4">
      <nav aria-label="Heartly policies" class="d-flex flex-wrap gap-3">
        <a href="{% url 'community_guidelines' %}">Community Guidelines</a>
        <a href="{% url 'privacy_policy' %}">Privacy</a>
        <a href="{% url 'terms_of_service' %}">Terms</a>
      </nav>
    </div>
  </article>
</main>
{% endblock %}

{% extends 'heartly/base.html' %}
{% block title %}Help & Support - Heartly{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 pb-24 max-w-md mx-auto">

    <div class="bg-white px-5 py-4 flex items-center border-b sticky top-0 z-10">
        <a href="{% url 'profile' %}" class="text-gray-500 mr-4"><i class="fas fa-arrow-left text-xl"></i></a>
        <h1 class="text-xl font-semibold">Help & Support</h1>
    </div>

    <div class="px-5 pt-6 space-y-4">

        <a href="#" class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <i class="fas fa-question-circle text-[#14b8a6] text-xl"></i>
                <span class="font-medium">FAQs</span>
            </div>
            <i class="fas fa-chevron-right text-gray-400"></i>
        </a>

        <a href="#" class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <i class="fas fa-headset text-[#14b8a6] text-xl"></i>
                <span class="font-medium">Contact Support</span>
            </div>
            <i class="fas fa-chevron-right text-gray-400"></i>
        </a>

        <a href="#" class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <i class="fas fa-bug text-[#14b8a6] text-xl"></i>
                <span class="font-medium">Report a Problem</span>
            </div>
            <i class="fas fa-chevron-right text-gray-400"></i>
        </a>

        <a href="#" class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <i class="fas fa-file-alt text-[#14b8a6] text-xl"></i>
                <span class="font-medium">Terms of Service</span>
            </div>
            <i class="fas fa-chevron-right text-gray-400"></i>
        </a>

        <a href="#" class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <i class="fas fa-user-secret text-[#14b8a6] text-xl"></i>
                <span class="font-medium">Privacy Policy</span>
            </div>
            <i class="fas fa-chevron-right text-gray-400"></i>
        </a>

        <div class="text-center pt-6">
            <p class="text-sm text-gray-500">App Version 1.0.0</p>
        </div>

    </div>
</div>
{% endblock %}
